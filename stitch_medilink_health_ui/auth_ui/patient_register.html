<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration | MediLink Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#003d9b" },
                    fontFamily: { headline: ["Manrope"], body: ["Inter"] }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-body relative overflow-hidden">
    <!-- Background accents -->
    <div class="absolute top-0 left-0 w-full h-96 bg-primary/10 rounded-b-[4rem] -z-10"></div>
    <div class="absolute top-20 right-20 w-64 h-64 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 -z-10"></div>
    <div class="absolute bottom-20 left-20 w-64 h-64 bg-green-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 -z-10"></div>

    <div class="glass-card p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4">
        <a href="../landing_page/landing_page.html" class="flex items-center gap-2 mb-8 text-primary hover:underline">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
        </a>
        <h2 class="text-3xl font-headline font-extrabold text-gray-900 mb-2">Patient Registration</h2>
        <p class="text-gray-500 mb-8 text-sm">Join the clinical sanctuary. Your data is yours.</p>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Date of Birth</label>
                <input type="date" id="dob" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <p id="errorMsg" class="text-red-500 text-sm hidden"></p>
            <button type="submit" class="w-full py-4 mt-6 bg-primary text-white rounded-xl font-bold text-lg hover:bg-blue-800 transition-colors shadow-lg">
                Create Account
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Login</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                full_name: document.getElementById('fullName').value,
                dob: document.getElementById('dob').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const res = await fetch('/api/auth/register/patient', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) {
                    document.getElementById('errorMsg').textContent = data.detail || 'Registration failed';
                    document.getElementById('errorMsg').classList.remove('hidden');
                } else {
                    localStorage.setItem('medilink_token', data.access_token);
                    localStorage.setItem('medilink_role', data.role);
                    window.location.href = '../patient_dashboard_prescription_analysis/patient_dashboard_prescription_analysis.html';
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'An error occurred connecting to the server.';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
