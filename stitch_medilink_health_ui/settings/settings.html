<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediLink Settings</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="sticky top-0 z-50 bg-white/85 backdrop-blur border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="../landing_page/landing_page.html" class="text-xl font-extrabold tracking-tight text-blue-700">MediLink</a>
      <button id="back-btn" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-100">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        Back
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
    <section class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
      <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900">Settings</h1>
      <p class="text-slate-600 mt-2">Manage your profile, notifications, and security preferences.</p>
      <div class="mt-4 text-sm text-slate-600">
        <p><span class="font-semibold text-slate-900">Current role:</span> <span id="role-display">Guest</span></p>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-4">
        <h2 class="text-lg font-bold">Profile</h2>
        <label class="block text-sm font-medium text-slate-700">Display Name</label>
        <input id="display-name" type="text" class="w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500" placeholder="Enter display name" />

        <label class="block text-sm font-medium text-slate-700">Email</label>
        <input id="display-email" type="email" class="w-full rounded-lg border-slate-300 focus:ring-blue-500 focus:border-blue-500" placeholder="Enter email" />

        <button id="save-profile" class="w-full mt-2 py-2.5 rounded-lg bg-blue-700 hover:bg-blue-800 text-white font-semibold">Save Profile</button>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-4">
        <h2 class="text-lg font-bold">Preferences</h2>

        <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
          <span class="text-sm font-medium">Email Notifications</span>
          <input id="pref-email" type="checkbox" class="rounded border-slate-300 text-blue-700" />
        </label>

        <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
          <span class="text-sm font-medium">SMS Alerts</span>
          <input id="pref-sms" type="checkbox" class="rounded border-slate-300 text-blue-700" />
        </label>

        <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
          <span class="text-sm font-medium">Two-Factor Authentication</span>
          <input id="pref-2fa" type="checkbox" class="rounded border-slate-300 text-blue-700" />
        </label>

        <button id="save-prefs" class="w-full mt-2 py-2.5 rounded-lg bg-slate-800 hover:bg-slate-900 text-white font-semibold">Save Preferences</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
      <h2 class="text-lg font-bold mb-4">Account Actions</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button id="logout-btn" class="py-2.5 rounded-lg border border-red-300 text-red-700 hover:bg-red-50 font-semibold">Log Out</button>
        <button id="home-btn" class="py-2.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 font-semibold">Go To Home</button>
      </div>
    </section>
  </main>

  <script>
    (function initSettingsPage() {
      const role = localStorage.getItem('medilink_role') || 'guest';
      document.getElementById('role-display').textContent = role.charAt(0).toUpperCase() + role.slice(1);

      const nameKey = 'medilink_settings_display_name';
      const emailKey = 'medilink_settings_email';
      const prefEmailKey = 'medilink_settings_pref_email';
      const prefSmsKey = 'medilink_settings_pref_sms';
      const pref2faKey = 'medilink_settings_pref_2fa';

      const nameEl = document.getElementById('display-name');
      const emailEl = document.getElementById('display-email');
      const prefEmailEl = document.getElementById('pref-email');
      const prefSmsEl = document.getElementById('pref-sms');
      const pref2faEl = document.getElementById('pref-2fa');

      nameEl.value = localStorage.getItem(nameKey) || '';
      emailEl.value = localStorage.getItem(emailKey) || '';
      prefEmailEl.checked = localStorage.getItem(prefEmailKey) === 'true';
      prefSmsEl.checked = localStorage.getItem(prefSmsKey) === 'true';
      pref2faEl.checked = localStorage.getItem(pref2faKey) === 'true';

      document.getElementById('save-profile').addEventListener('click', function () {
        localStorage.setItem(nameKey, nameEl.value.trim());
        localStorage.setItem(emailKey, emailEl.value.trim());
        window.alert('Profile settings saved.');
      });

      document.getElementById('save-prefs').addEventListener('click', function () {
        localStorage.setItem(prefEmailKey, String(prefEmailEl.checked));
        localStorage.setItem(prefSmsKey, String(prefSmsEl.checked));
        localStorage.setItem(pref2faKey, String(pref2faEl.checked));
        window.alert('Preferences saved.');
      });

      document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('medilink_token');
        localStorage.removeItem('medilink_role');
        window.location.href = '../auth_ui/login.html';
      });

      function getHomeDestination() {
        const token = localStorage.getItem('medilink_token');
        if (!token) return '../landing_page/landing_page.html';

        if (role === 'patient') return '../patient_dashboard_prescription_analysis/patient_dashboard_prescription_analysis.html';
        if (role === 'doctor') return '../doctor_dashboard/doctor_dashboard.html';
        if (role === 'pharmacy') return '../pharmacy_dashboard/pharmacy_dashboard.html';
        return '../landing_page/landing_page.html';
      }

      document.getElementById('home-btn').addEventListener('click', function () {
        window.location.href = getHomeDestination();
      });

      document.getElementById('back-btn').addEventListener('click', function () {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = '../landing_page/landing_page.html';
      });
    })();
  </script>
</body>
</html>
