<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediLink Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#003d9b" },
                    fontFamily: { headline: ["Manrope"], body: ["Inter"] }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); }
    </style>
</head>
<body class="bg-gray-50 flex items-start justify-center min-h-screen font-body relative py-12">
    <!-- Background accents -->
    <div class="absolute inset-0 bg-gradient-to-tr from-blue-100 to-green-50 -z-10"></div>

    <div class="glass-card p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4">
        <a href="../landing_page/landing_page.html" class="flex items-center gap-2 mb-8 text-primary hover:underline">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
        </a>
        <h2 class="text-3xl font-headline font-extrabold text-gray-900 mb-2">Welcome Back</h2>
        <p class="text-gray-500 mb-8 text-sm">Securely log in to your patient or provider account.</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            </div>
            <p id="errorMsg" class="text-red-500 text-sm hidden"></p>
            <button type="submit" class="w-full py-4 mt-6 bg-primary text-white rounded-xl font-bold text-lg hover:bg-blue-800 transition-colors shadow-lg">
                Log In
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
            Don't have an account? <br>
            <a href="patient_register.html" class="text-primary font-bold hover:underline">Register as Patient</a> | 
            <a href="provider_register.html" class="text-primary font-bold hover:underline">Register as Provider</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) {
                    document.getElementById('errorMsg').textContent = data.detail || 'Login failed';
                    document.getElementById('errorMsg').classList.remove('hidden');
                } else {
                    localStorage.setItem('medilink_token', data.access_token);
                    localStorage.setItem('medilink_role', data.role);
                    
                    // Redirect based on role
                    if (data.role === 'patient') {
                        window.location.href = '../patient_dashboard_prescription_analysis/patient_dashboard_prescription_analysis.html';
                    } else if (data.role === 'doctor') {
                        window.location.href = '../doctor_dashboard/doctor_dashboard.html';
                    } else if (data.role === 'pharmacy') {
                        window.location.href = '../pharmacy_dashboard/pharmacy_dashboard.html';
                    } else {
                        window.location.href = '../landing_page/landing_page.html';
                    }
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'An error occurred connecting to the server.';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
